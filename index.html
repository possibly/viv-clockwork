<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1208" />
    <title>The Clockmaker</title>
    <style>
      /* ─── Reset ──────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

      :root {
        --cream:    #faf6f0;
        --parchment:#f5ede0;
        --gold:     #c8a35a;
        --dark:     #1a1208;
        --dark2:    #2a1f14;
        --mid:      #6b4f35;
        --lt:       #9a7a5a;
        --ink:      #1a1208;
        --border:   #d9c9b3;
        --panel:    #fdf9f4;
        --green:    #4caf50;
        --red:      #e57373;
        --r:        8px;
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--ink);
        background: var(--dark);
      }

      /* ─── App shell: header | stage | bottom-panel ───────────── */
      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;         /* dynamic viewport height for mobile */
        background: var(--dark);
      }

      /* ─── Header ─────────────────────────────────────────────── */
      #header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        background: var(--dark);
        border-bottom: 1px solid #3a2f20;
      }

      #header h1 {
        font-size: 0.85rem;
        font-weight: normal;
        letter-spacing: 0.12em;
        color: var(--gold);
        white-space: nowrap;
        text-transform: uppercase;
      }

      #header-status {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
        min-width: 0;
        justify-content: flex-end;
      }

      .header-level {
        font-size: 0.8rem;
        color: #d0b07a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }

      .badge {
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.65rem;
        font-family: sans-serif;
        font-weight: bold;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .badge--running { background: #1b5e20; color: #81c784; }
      .badge--paused  { background: #4a3a00; color: #ffd54f; }
      .badge--setup   { background: #0d2f5a; color: #90caf9; }
      .badge--done    { background: #4a2200; color: var(--gold); }
      .ts-badge {
        font-family: monospace;
        font-size: 0.68rem;
        color: #7a6a4a;
        white-space: nowrap;
      }

      /* ─── Stage ──────────────────────────────────────────────── */
      #stage {
        flex: 1 1 0;
        min-height: 0;
        position: relative;
        background: var(--parchment);
        overflow: hidden;
      }

      #stage-svg {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: manipulation;
      }

      /* ─── Level banner ───────────────────────────────────────── */
      #level-banner {
        display: none;
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--dark);
        padding: 10px 22px;
        border-radius: var(--r);
        font-size: 0.85rem;
        border: 1px solid var(--gold);
        z-index: 20;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }
      .level-banner--won     { color: #81c784; }
      .level-banner--timeout { color: #ffb74d; }

      /* ─── Bottom panel ───────────────────────────────────────── */
      #bottom-panel {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border-top: 2px solid var(--border);
        /* Height controlled via JS/CSS variable, user can expand */
        height: 38vh;
        max-height: 75vh;
        min-height: 120px;
        position: relative;
      }

      /* drag handle */
      #panel-handle {
        flex: 0 0 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: ns-resize;
        touch-action: none;
        user-select: none;
        background: var(--panel);
      }
      #panel-handle::after {
        content: "";
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
      }

      /* ─── Tab bar ─────────────────────────────────────────────── */
      #tab-bar {
        flex: 0 0 auto;
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        background: #f0e8d8;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #tab-bar::-webkit-scrollbar { display: none; }

      .tab-btn {
        flex: 1 0 auto;
        padding: 8px 12px;
        border: none;
        background: none;
        font-size: 0.72rem;
        font-family: sans-serif;
        color: var(--lt);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        transition: color 0.15s, border-color 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        min-width: 56px;
      }
      .tab-btn .tab-icon { font-size: 1rem; }
      .tab-btn.active {
        color: var(--mid);
        border-bottom-color: var(--gold);
        background: var(--panel);
      }

      /* ─── Tab content ─────────────────────────────────────────── */
      #tab-content {
        flex: 1 1 0;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .tab-pane { display: none; padding: 10px 12px; }
      .tab-pane.active { display: block; }

      /* ─── Goals tab ───────────────────────────────────────────── */
      #tab-goals { padding: 10px 12px; }

      .win-conditions {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 10px;
      }
      .win-condition {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.78rem;
        padding: 6px 10px;
        border-radius: var(--r);
        background: #eee4d4;
        color: var(--mid);
        font-family: sans-serif;
        border: 1px solid var(--border);
      }
      .win-condition .wc-icon { font-size: 1rem; flex-shrink: 0; }
      .win-condition--met { background: #dff0df; color: #2e6a2e; border-color: #a5d6a7; }

      /* ─── Run controls ───────────────────────────────────────── */
      .run-controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
      }

      .btn {
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: #fff;
        color: var(--ink);
        font-size: 0.82rem;
        cursor: pointer;
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: background 0.12s;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .btn:active:not(:disabled) { background: #e8dcc8; }
      .btn:disabled { opacity: 0.38; cursor: default; }

      .btn--primary {
        background: var(--dark);
        color: var(--gold);
        border-color: var(--dark);
        font-weight: bold;
        grid-column: 1 / -1;     /* spans full width */
        font-size: 1rem;
        padding: 14px;
      }
      .btn--primary:active { background: var(--dark2); }

      .btn--secondary {
        background: var(--dark2);
        color: #d0b07a;
        border-color: #3a2f20;
        font-size: 0.75rem;
      }

      .speed-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
      }
      .speed-label {
        font-size: 0.7rem;
        color: var(--lt);
        font-family: sans-serif;
        white-space: nowrap;
      }
      .btn--speed {
        flex: 1;
        padding: 6px 4px;
        font-size: 0.7rem;
        border-radius: 6px;
      }
      .btn--speed-active { background: var(--gold) !important; color: #fff; border-color: var(--gold); }

      .step-info {
        text-align: center;
        font-size: 0.72rem;
        color: var(--lt);
        font-family: monospace;
        margin-top: 4px;
      }

      /* ─── Setup controls ─────────────────────────────────────── */
      .setup-brief {
        font-size: 0.75rem;
        color: var(--mid);
        font-style: italic;
        font-family: sans-serif;
        margin-bottom: 8px;
      }
      .char-tray {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .char-chip {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.72rem;
        cursor: grab;
        font-family: sans-serif;
        user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      .char-loc {
        color: var(--lt);
        font-size: 0.65rem;
      }
      .location-targets {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .location-drop-target {
        flex: 1 0 calc(33% - 6px);
        min-width: 80px;
        padding: 8px 6px;
        border: 2px dashed var(--border);
        border-radius: var(--r);
        font-size: 0.72rem;
        color: var(--mid);
        font-family: sans-serif;
        text-align: center;
        transition: background 0.12s, border-color 0.12s;
      }
      .location-drop-target.dragover { background: #fff3cd; border-color: var(--gold); }

      /* ─── Chronicle tab ──────────────────────────────────────── */
      #tab-chronicle { padding: 6px 8px; }
      .chronicle-entry {
        padding: 4px 6px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.12s;
        font-size: 0.78rem;
        line-height: 1.5;
        border-bottom: 1px solid #f0e8d8;
      }
      .chronicle-entry:last-child { border-bottom: none; }
      .chronicle-entry:active { background: #ede4d4; }
      .chronicle-entry--highlighted { background: #fff3cd; }
      .chronicle-ts {
        color: var(--lt);
        font-size: 0.68rem;
        font-family: monospace;
        margin-right: 4px;
      }
      .chronicle-break {
        text-align: center;
        color: var(--gold);
        font-size: 0.68rem;
        margin: 8px 0 4px;
        letter-spacing: 0.06em;
        font-family: sans-serif;
      }

      /* ─── Inspect tab ────────────────────────────────────────── */
      #tab-inspect { padding: 8px 12px; }
      .state-placeholder {
        color: var(--lt);
        font-style: italic;
        font-size: 0.78rem;
        text-align: center;
        padding: 20px 0;
        font-family: sans-serif;
      }
      .char-card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .char-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .char-name { font-weight: bold; font-size: 0.88rem; }
      .char-archetype { color: var(--lt); font-size: 0.72rem; font-style: italic; }
      .char-stats { margin-bottom: 8px; }
      .stat {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
        font-size: 0.72rem;
        font-family: sans-serif;
      }
      .stat-label { width: 72px; color: var(--mid); }
      .stat-bar { flex: 1; height: 7px; background: #e0d4c0; border-radius: 4px; overflow: hidden; }
      .stat-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.3s; }
      .stat-fill.rep { background: var(--green); }
      .stat-fill.sus { background: var(--red); }
      .stat-val { width: 22px; text-align: right; font-size: 0.7rem; color: var(--mid); }
      .section-title {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--lt);
        margin: 8px 0 3px;
        font-family: sans-serif;
      }
      .affection-row, .item-row, .memory-row {
        font-size: 0.75rem;
        padding: 2px 0;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .affection-val { color: #c2185b; font-weight: bold; }

      /* ─── Actions tab ────────────────────────────────────────── */
      #tab-actions { padding: 6px 8px; }
      .action-card {
        margin-bottom: 8px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
        background: #fff;
      }
      .action-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer;
        background: var(--parchment);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .action-name {
        font-size: 0.78rem;
        font-weight: bold;
        font-family: sans-serif;
        flex: 1;
      }
      .action-count {
        font-size: 0.68rem;
        font-family: monospace;
        color: var(--lt);
        background: #e8dcc8;
        padding: 1px 6px;
        border-radius: 8px;
      }
      .action-chevron {
        font-size: 0.6rem;
        color: var(--lt);
        transition: transform 0.2s;
      }
      .action-card.open .action-chevron { transform: rotate(90deg); }
      .action-body {
        display: none;
        padding: 8px 10px;
        font-size: 0.74rem;
        font-family: sans-serif;
      }
      .action-card.open .action-body { display: block; }
      .action-desc { color: var(--mid); margin-bottom: 6px; line-height: 1.4; }
      .action-affinity-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 3px;
      }
      .affinity-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .affinity-name { color: var(--mid); flex: 1; }
      .affinity-role {
        font-size: 0.65rem;
        background: #e8dcc8;
        padding: 1px 5px;
        border-radius: 6px;
        color: var(--mid);
      }

      /* ─── Graph tab ──────────────────────────────────────────── */
      #tab-graph { padding: 6px 0; }
      #graph-svg-wrap {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      #graph-svg { display: block; min-width: 100%; }
      .graph-empty {
        padding: 24px 16px;
        text-align: center;
        font-size: 0.78rem;
        color: var(--lt);
        font-family: sans-serif;
        font-style: italic;
      }
      .graph-section-label {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--lt);
        font-family: sans-serif;
        padding: 4px 12px;
        margin-top: 4px;
      }

      /* ─── Scrollbars ─────────────────────────────────────────── */
      #tab-content::-webkit-scrollbar { width: 4px; }
      #tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header id="header">
        <h1>The Clockmaker</h1>
        <div id="header-status"></div>
      </header>

      <!-- Stage -->
      <main id="stage">
        <svg id="stage-svg" viewBox="0 0 660 360" preserveAspectRatio="xMidYMid meet"></svg>
        <div id="level-banner"></div>
      </main>

      <!-- Bottom panel -->
      <div id="bottom-panel">
        <div id="panel-handle"></div>

        <!-- Tab bar -->
        <nav id="tab-bar">
          <button class="tab-btn active" data-tab="goals">
            <span class="tab-icon">🎯</span>Goals
          </button>
          <button class="tab-btn" data-tab="chronicle">
            <span class="tab-icon">📜</span>Log
          </button>
          <button class="tab-btn" data-tab="inspect">
            <span class="tab-icon">👤</span>Inspect
          </button>
          <button class="tab-btn" data-tab="actions">
            <span class="tab-icon">⚔️</span>Actions
          </button>
          <button class="tab-btn" data-tab="graph">
            <span class="tab-icon">🕸️</span>Graph
          </button>
        </nav>

        <!-- Tab content -->
        <div id="tab-content">
          <div id="tab-goals"   class="tab-pane active"></div>
          <div id="tab-chronicle" class="tab-pane"></div>
          <div id="tab-inspect"  class="tab-pane"></div>
          <div id="tab-actions"  class="tab-pane"></div>
          <div id="tab-graph"    class="tab-pane"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
