<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#060d1a"/>
  <title>The Clockmaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0c1527;
      --ink2:    #060d1a;
      --cream:   #f0e6d2;
      --gold:    #c9a96e;
      --gold2:   #8a6a30;
      --dim:     #6a5a40;
      --r:       12px;
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--ink2);
      color: var(--cream);
      overflow: hidden;
    }

    /* ── App layout ──────────────────────────────────────────────────────── */
    #app {
      display: grid;
      height: 100dvh;
      /* header | [stage + side-column] | guest-list */
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
    }

    @media (min-width: 700px) {
      #app {
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr 300px;
        grid-template-areas:
          "header   header"
          "stage    side"
          "guests   side";
      }
      #header        { grid-area: header; }
      #stage-wrap    { grid-area: stage;  }
      #side-column   { grid-area: side; display: flex !important; }
      #guest-section { grid-area: guests; }
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #08101e;
      border-bottom: 1px solid #1e2d44;
      flex-shrink: 0;
    }

    #header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Goal indicator pill */
    #goal-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111c2e;
      border: 1px solid #2a3d5a;
      border-radius: 20px;
      padding: 6px 14px;
      max-width: min(480px, 55vw);
      transition: border-color 0.5s, background 0.5s;
    }

    #goal-indicator.goal--met {
      border-color: var(--gold);
      background: #1a1500;
    }

    .goal-seal {
      font-size: 1.1rem;
      color: var(--gold);
      flex-shrink: 0;
      transition: transform 0.4s;
    }

    #goal-indicator.goal--met .goal-seal {
      transform: scale(1.4) rotate(15deg);
      color: #ffd700;
    }

    .goal-heading {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 1px;
    }

    .goal-desc {
      font-size: clamp(0.68rem, 1.8vw, 0.8rem);
      font-style: italic;
      color: #b0a080;
      line-height: 1.3;
    }

    /* ── Stage wrap ──────────────────────────────────────────────────────── */
    #stage-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #0a0f1a;
    }

    #stage-svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: manipulation;
    }

    /* ── Moment card overlay ─────────────────────────────────────────────── */
    #moment-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
    }

    .moment-card {
      width: min(480px, 90vw);
      border: 1px solid transparent;
      border-radius: var(--r);
      padding: 22px 24px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      box-shadow: 0 8px 40px #00000088, 0 0 0 1px #ffffff08;
      /* Enter: scale up from slightly below */
      opacity: 0;
      transform: translateY(18px) scale(0.97);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .moment-card--visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .moment-card--exit {
      opacity: 0;
      transform: translateY(-14px) scale(0.96);
      transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
    }

    .moment-ornament {
      opacity: 0.75;
      flex-shrink: 0;
    }

    .moment-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .moment-text {
      font-size: clamp(0.88rem, 2.2vw, 1.05rem);
      font-style: italic;
      font-weight: 500;
      line-height: 1.65;
      color: #f0e6d2;
      max-width: 38ch;
      border: none;
      padding: 0;
    }

    .moment-participants {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .moment-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    /* ── Celebration banner ──────────────────────────────────────────────── */
    .celebration-banner {
      width: min(500px, 92vw);
      background: linear-gradient(160deg, #1a1200 0%, #0a0800 100%);
      border: 1px solid var(--gold);
      border-radius: var(--r);
      padding: 28px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      box-shadow: 0 0 60px #c9a96e44;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .celebration-banner--visible {
      opacity: 1;
      transform: scale(1);
    }

    .celebration-ornament {
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 0.5em;
    }

    .celebration-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    .celebration-sub {
      font-size: clamp(0.82rem, 2vw, 0.95rem);
      font-style: italic;
      color: #b0a070;
      line-height: 1.7;
    }

    /* ── Side column (desktop only, hidden on mobile) ────────────────────── */
    #side-column {
      display: none;
      flex-direction: column;
      background: #08101e;
      border-left: 1px solid #1e2d44;
      overflow: hidden;
    }

    .side-heading {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 10px 14px 6px;
      border-bottom: 1px solid #1e2d44;
      flex-shrink: 0;
    }

    #chronicle-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chronicle-scroll::-webkit-scrollbar { width: 4px; }
    #chronicle-scroll::-webkit-scrollbar-thumb { background: #2a3d5a; border-radius: 2px; }

    /* On mobile, show chronicle below the stage */
    #chronicle-mobile {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      padding: 8px;
      background: #08101e;
      border-top: 1px solid #1e2d44;
    }
    #chronicle-mobile #chronicle-scroll {
      flex-direction: row;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }
    @media (min-width: 700px) {
      #chronicle-mobile { display: none; }
    }

    .scroll-entry {
      border-left: 2px solid transparent;
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
      background: #0d1828;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      flex-shrink: 0;
    }

    .scroll-entry--visible {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .scroll-sentence {
      font-size: 0.78rem;
      font-style: italic;
      color: #9a8a6a;
      line-height: 1.4;
      white-space: normal;
    }

    /* On mobile, scroll entries are horizontal pills */
    @media (max-width: 699px) {
      .scroll-entry {
        display: inline-block;
        min-width: 180px;
        max-width: 240px;
        border-left: none;
        border-bottom: 2px solid transparent;
        border-radius: 6px;
        margin-right: 6px;
        transform: translateY(6px);
      }
      .scroll-entry--visible { transform: translateY(0); }
    }

    /* ── Guest list ──────────────────────────────────────────────────────── */
    #guest-section {
      padding: 10px 14px;
      background: #060e1c;
      border-top: 1px solid #1e2d44;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #guest-list {
      display: flex;
      gap: 10px;
      flex: 1;
      flex-wrap: wrap;
    }

    .guest-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #0f1e30;
      border: 1px solid #1e2d44;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: grab;
      transition: border-color 0.2s, transform 0.15s, opacity 0.3s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .guest-card:active { cursor: grabbing; }

    .guest-card--selected {
      border-color: var(--gold);
      transform: scale(1.03);
      box-shadow: 0 0 16px var(--char-color, #c9a96e)44;
    }

    .guest-card--placed {
      opacity: 0.65;
      cursor: default;
      pointer-events: none;
    }

    .guest-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .guest-portrait {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .guest-initial {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: white;
      font-weight: 600;
    }

    .guest-name {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--cream);
      letter-spacing: 0.05em;
    }

    .guest-title {
      font-size: 0.68rem;
      font-style: italic;
      color: var(--dim);
    }

    .guest-status {
      font-size: 0.62rem;
      font-family: sans-serif;
      color: #4a6080;
      white-space: nowrap;
    }

    /* ── Action availability panel ───────────────────────────────────────── */
    .guest-actions {
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #192840;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.63rem;
      color: #3d5070;
    }

    .action-row--on { color: #8a9aaa; }

    .action-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #1e2d44;
    }

    .action-dot--on { background: var(--gold); }

    .action-label { flex: 1; }

    .action-req {
      font-style: italic;
      color: #2a3d5a;
      font-size: 0.58rem;
    }

    /* ── Begin button ────────────────────────────────────────────────────── */
    #begin-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      padding: 10px 22px;
      background: #0f1e30;
      color: #4a6080;
      border: 1px solid #1e2d44;
      border-radius: 8px;
      cursor: not-allowed;
      transition: all 0.3s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    #begin-btn.begin-btn--ready:not(:disabled) {
      background: var(--ink2);
      color: var(--gold);
      border-color: var(--gold);
      cursor: pointer;
      box-shadow: 0 0 20px #c9a96e22;
    }

    #begin-btn.begin-btn--ready:not(:disabled):hover {
      background: #1a1200;
      box-shadow: 0 0 28px #c9a96e44;
    }

    #begin-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ── Drag-over highlight on the stage ────────────────────────────────── */
    #stage-wrap.drag-over #stage-svg {
      outline: 2px dashed var(--gold);
      outline-offset: -4px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>The Clockmaker</h1>
    <div id="goal-indicator"></div>
  </header>

  <!-- Stage -->
  <div id="stage-wrap">
    <svg id="stage-svg"
         viewBox="0 0 660 400"
         preserveAspectRatio="xMidYMid meet">
    </svg>
    <div id="moment-wrap"></div>
  </div>

  <!-- Chronicle — single scroll used by both desktop side panel + mobile strip -->
  <aside id="side-column">
    <div class="side-heading">Chronicle of the Evening</div>
    <div id="chronicle-scroll"></div>
  </aside>

  <!-- Mobile: horizontal strip (clones entries via JS) -->
  <div id="chronicle-mobile">
    <div id="chronicle-scroll-mobile"></div>
  </div>

  <!-- Guest list + Begin button -->
  <section id="guest-section">
    <div id="guest-list"></div>
    <button id="begin-btn" disabled>Place your guests</button>
  </section>

</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
